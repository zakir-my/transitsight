name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to HF Spaces via API
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: pip install huggingface-hub -q && python3 scripts/hf-sync.py
