name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to HF Spaces
        run: |
          git remote add hf https://zakir-my:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/zakir-my/transitsight
          git push hf main --force
