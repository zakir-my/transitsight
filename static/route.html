<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Detail - TransitSight</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">🚆 Transit<span>Sight</span></a>
        <div class="nav-links">
            <a href="/dashboard" id="back-link">← Back</a>
        </div>
    </nav>

    <div class="container">
        <div id="loading-spinner" class="spinner"></div>

        <div id="route-detail" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <div>
                        <div id="route-name" style="font-size: 1.3em; font-weight: 700;"></div>
                        <div id="route-meta" style="color: var(--text-secondary); font-size: 0.85em; margin-top: 2px;"></div>
                    </div>
                    <span id="route-color-badge" class="crowd-badge"></span>
                </div>
            </div>

            <div class="card prediction-display">
                <div style="font-size: 0.9em; color: var(--text-secondary); margin-bottom: 8px;">AI Crowd Prediction</div>
                <div id="prediction-level" class="prediction-level">—</div>
                <div id="prediction-context" class="prediction-context"></div>
                <div id="confidence-container" style="display: none;">
                    <div class="confidence-bar">
                        <div id="confidence-fill" class="confidence-fill"></div>
                    </div>
                    <div id="confidence-label" style="font-size: 0.8em; color: var(--text-secondary);"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title" style="margin-bottom: 10px;">📊 Report Actual Crowd Level</div>
                <p style="color: var(--text-secondary); font-size: 0.85em; margin-bottom: 12px;">
                    Help improve predictions! Tell us what the crowd is really like.
                </p>
                <div class="feedback-group">
                    <button class="btn btn-green btn-small" onclick="submitFeedback('Low')">🟢 Low</button>
                    <button class="btn btn-yellow btn-small" onclick="submitFeedback('Medium')">🟡 Medium</button>
                    <button class="btn btn-red btn-small" onclick="submitFeedback('Full')">🔴 Full</button>
                </div>
                <div id="feedback-msg" style="margin-top: 10px; text-align: center; font-size: 0.9em; color: var(--accent);"></div>
                <div id="streak-msg" style="margin-top: 4px; text-align: center; font-size: 0.8em; color: var(--text-secondary);"></div>
            </div>

            <div class="card">
                <div class="card-title" style="margin-bottom: 10px;">📈 Recent Predictions</div>
                <div id="recent-predictions"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/route-detail.js"></script>
</body>
</html>
