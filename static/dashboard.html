<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TransitSight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <div class="nav-brand-icon"><i data-lucide="train-front" class="lucide-brand"></i></div>
            <div>Transit<span>Sight</span></div>
        </a>
        <button class="nav-toggle" onclick="toggleNav()"><i data-lucide="menu"></i></button>
        <div class="nav-links">
            <a href="/dashboard" class="active">Dashboard</a>
            <a href="/authority">Authorities</a>
            <a href="/profile">Profile</a>
            <a href="/admin">Admin</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div>
                <h2>Transit Fleet Dashboard</h2>
                <p>Real-time crowd predictions for all KL transit lines</p>
            </div>
            <div class="page-header-actions">
                <span class="update-badge" id="last-updated"></span>
                <button class="btn btn-outline" onclick="refreshAll()"><i data-lucide="refresh-cw" class="lucide-sm"></i> Refresh</button>
            </div>
        </div>

        <div class="filter-tabs" id="filter-tabs">
            <button class="filter-tab active" data-filter="all">All Lines</button>
        </div>

        <div class="search-bar">
            <div class="search-input-wrapper">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="search-input" placeholder="Search routes by name, code, or agency..." oninput="searchRoutes(this.value)">
            </div>
            <button class="btn btn-outline" onclick="refreshAll()"><i data-lucide="rotate-cw" class="lucide-sm"></i> Refresh All</button>
        </div>

        <div class="skeleton-grid" id="loading-skeleton">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>

        <div class="route-grid" id="route-list"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script>
        lucide.createIcons();
        // Safety fallback: if routes don't load in 8s, show a visible error
        setTimeout(function() {
            var list = document.getElementById('route-list');
            var skel = document.getElementById('loading-skeleton');
            if (list && list.innerHTML.trim() === '' && skel && skel.style.display !== 'none') {
                skel.style.display = 'none';
                list.innerHTML = '<div class="empty-state">Routes took too long to load.<br><small>Check your connection or try refreshing the page.</small></div>';
            }
        }, 8000);
    </script>
</body>
</html>
