<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - TransitSight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <div class="nav-brand-icon"><i data-lucide="train-front" class="lucide-brand"></i></div>
            <div>Transit<span>Sight</span></div>
        </a>
        <button class="nav-toggle" onclick="toggleNav()"><i data-lucide="menu"></i></button>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/dashboard">🔍 Search</a>
            <a href="/authority">Authorities</a>
            <a href="/profile" class="active">Profile</a>
            <a href="/admin">Admin</a>
        </div>
    </nav>

    <div class="container">
        <div id="loading-spinner" class="spinner"></div>

        <div id="profile-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h2>👤 My Profile</h2>
                </div>
                <div id="profile-stats" class="stats-grid"></div>
            </div>

            <div class="card">
                <div class="card-title" style="margin-bottom: 10px;">📋 My Feedback History</div>
                <div id="feedback-history"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/profile.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
